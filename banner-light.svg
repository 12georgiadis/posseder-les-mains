<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Posséder les mains">
  <rect width="1280" height="400" fill="#F2EFE9"/>

  <!-- line-art: minimal machine network -->
  <g fill="none" stroke="#C9C4BA" stroke-width="1.25">
    <!-- structural links -->
    <line x1="960" y1="200" x2="800" y2="110"/>
    <line x1="960" y1="200" x2="740" y2="250"/>
    <line x1="960" y1="200" x2="905" y2="332"/>
    <line x1="960" y1="200" x2="1160" y2="220"/>
    <line x1="960" y1="200" x2="1080" y2="292"/>
    <line x1="800" y1="110" x2="1120" y2="128"/>
    <line x1="740" y1="250" x2="905" y2="332"/>
    <line x1="1160" y1="220" x2="1120" y2="128"/>
    <line x1="1080" y1="292" x2="905" y2="332"/>
  </g>

  <!-- machines -->
  <g fill="#F2EFE9" stroke="#C9C4BA" stroke-width="1.5">
    <rect x="794" y="104" width="12" height="12"/>
    <rect x="1114" y="122" width="12" height="12"/>
    <rect x="734" y="244" width="12" height="12"/>
    <rect x="1154" y="214" width="12" height="12"/>
    <rect x="1074" y="286" width="12" height="12"/>
    <rect x="899" y="326" width="12" height="12"/>
  </g>

  <!-- accent link + central node -->
  <line x1="960" y1="200" x2="1120" y2="128" stroke="#FF4400" stroke-width="1.5"/>
  <rect x="948" y="188" width="24" height="24" fill="#F2EFE9" stroke="#FF4400" stroke-width="1.75"/>

  <!-- text -->
  <text x="96" y="196" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="64" letter-spacing="0.5" fill="#141414">Posséder les mains</text>
  <text x="98" y="240" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="22" letter-spacing="0.3" fill="#6E6A62">Sovereign, artist-owned AI infrastructure for creation.</text>
</svg>
